# ASSURE 2.0 pilot stack
# Services: kernel (rules engine), backend (aura-demo API), frontend (Next.js), nginx (edge proxy).
# Run: docker compose up --build
name: assure-pilot

services:
  kernel:
    build:
      context: ./packages/assure-kernel
      dockerfile: Dockerfile
    container_name: assure-kernel
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: assure-backend
    environment:
      PORTFOLIOS_DB: /app/data/portfolios.db
      MARKET_SEED: "42"
      CORS_ALLOWED_ORIGINS: "*"
      # Auth is enforced by default. Empty AUTH_SECRET or AUTH_ADMIN_PASSWORD
      # will cause the backend to fail boot. Set them in your environment or
      # .env file before running docker compose up.
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-}
      AUTH_ENFORCE: ${AUTH_ENFORCE:-1}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - backend-data:/app/data
    depends_on:
      kernel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: assure-frontend
    environment:
      API_URL: http://backend:8000
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  voice-agent:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: assure-voice-agent
    environment:
      LIVEKIT_URL: ${LIVEKIT_URL:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ASSURE_API_BASE: http://backend:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    command: ["python", "-m", "agents.livekit_assistant", "start"]
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://backend:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: assure-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kernel
      - backend
      - frontend
      - voice-agent
    restart: unless-stopped

volumes:
  backend-data:
