  - type: target_allocation
    parameters:
      targets:
        Equity: 0.55
        Bonds: 0.35
      drift_tolerance: 0.07
  - type: top_n_concentration
    parameters:
      n: 5
      max_weight: 0.48
  - type: minimum_liquidity
    parameters:
      min_liquid_pct: 0.75
