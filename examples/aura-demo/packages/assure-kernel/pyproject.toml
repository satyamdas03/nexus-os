[project]
name = "assure-kernel"
version = "0.1.0"
description = "Deterministic portfolio assurance engine — the verified core of ASSURE."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-benchmark>=4.0",
    "hypothesis>=6.100",
    "pytest-xdist>=3.6",
]

[project.urls]
Repository = "https://github.com/satyamdas03/nexus-os"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
