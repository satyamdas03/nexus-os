services:
  assure-kernel:
    build:
      context: .
      dockerfile: Dockerfile
    image: assure-kernel:0.1.0
    container_name: assure-kernel
    ports:
      - "8000:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
